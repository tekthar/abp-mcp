name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-progress runs for the same branch in PRs to save Actions minutes;
# always finish runs against `main` so badges reflect the actual commit state.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore (cached)
        run: dotnet restore

      - name: Build (Release, warnings-as-errors)
        run: dotnet build --no-restore --configuration Release

      - name: Test (with TRX results)
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory "${GITHUB_WORKSPACE}/test-results"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/**/*.trx
          if-no-files-found: warn

  pack-smoke:
    name: Pack smoke (NuGet)
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Pack (dry run, ensures the package is producible from main)
        run: |
          dotnet pack src/AbpMcp/AbpMcp.csproj \
            --configuration Release \
            -o artifacts

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbpMcp-nupkg-preview
          path: artifacts/*.nupkg
          if-no-files-found: error
